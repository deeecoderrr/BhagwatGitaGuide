<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Bhagavad Gita Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #05060D; color: #E8B86D; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: rgba(23, 48, 68, 0.48); border: 1px solid rgba(232, 184, 109, 0.2); padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-top: 0; margin-bottom: 24px; text-align: center; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 40px; border: none; background: #E8B86D; color: #1A1042; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 20px; text-align: center; font-size: 14px; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset Password</h1>
        <div id="form-wrap">
            <div class="field">
                <label>New Password (min 8 chars)</label>
                <input type="password" id="password" required minlength="8">
            </div>
            <button id="submit-btn">Reset Password</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');
        const formWrap = document.getElementById('form-wrap');
        const passwordInput = document.getElementById('password');

        const uid = "{{ uid }}";
        const token = "{{ token }}";

        submitBtn.onclick = async () => {
            const password = passwordInput.value;
            if (password.length < 8) return;

            submitBtn.disabled = true;
            messageDiv.textContent = 'Resetting...';
            messageDiv.className = 'message';

            try {
                const response = await fetch('/api/v1/auth/reset-password/confirm/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, token, new_password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = 'Password reset successfully! You can now log in to the app.';
                    messageDiv.className = 'message success';
                    formWrap.style.display = 'none';
                } else {
                    messageDiv.textContent = data.detail || data.message || 'Failed to reset password. The link might be expired.';
                    messageDiv.className = 'message error';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                messageDiv.textContent = 'An error occurred. Please try again later.';
                messageDiv.className = 'message error';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
