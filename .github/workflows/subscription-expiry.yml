# Notify users whose subscription expires within 3 days, once daily.
# Requires FLY_API_TOKEN secret with SSH scope.

name: Subscription expiry reminders (Fly)

on:
  schedule:
    # Once daily at 08:00 UTC (13:30 IST)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: subscription-expiry
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Run notify_expiring_subscriptions on Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::FLY_API_TOKEN is not set."
            exit 1
          fi
          flyctl ssh console -a askbhagavadgita -C "python /code/manage.py notify_expiring_subscriptions --days 3"
