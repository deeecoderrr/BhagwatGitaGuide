# fly.toml app configuration file generated for bhagwatgitaguide on 2026-04-11T16:30:31+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'askbhagavadgita'
primary_region = 'bom'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'
  # Push reminders (Expo). Non-secret copy + window; see docs/DEVELOPER_GUIDE.md (Fly + push).
  PUSH_REMINDER_WINDOW_MINUTES = '15'
  PUSH_REMINDER_TITLE = 'Daily Gita reflection'
  PUSH_REMINDER_BODY = "Take a quiet moment with today's verse in Ask Bhagavad Gita."
  # Secret: set EXPO_ACCESS_TOKEN only via `flyctl secrets set` (never commit).

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/staticfiles'
  url_prefix = '/static/'

# Streak-at-risk push notifications — fires at 14:30 UTC (8:00 PM IST) every day.
# Sends a "🔥 Your N-day streak is at risk" push to users who haven't opened the
# app today and have an active streak. Noop if push credentials are not configured.
[[cronjob]]
  schedule = "30 14 * * *"
  command = "python manage.py send_streak_risk_reminders"
