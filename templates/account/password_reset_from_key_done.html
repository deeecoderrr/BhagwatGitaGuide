{% extends "base.html" %}
{% block title %}Password updated{% endblock %}
{% block content %}
<div class="wrap form-card card">
  <h1>Password updated</h1>
  <p class="muted">You can now sign in with your new password.</p>
  <p>
    <a class="btn btn-primary" href="{% url 'account_login' %}">Log in</a>
  </p>
  {% if support_email %}
  <p class="muted small" style="margin-top:1rem;">Questions? <a href="mailto:{{ support_email }}">{{ support_email }}</a></p>
  {% endif %}
</div>
{% endblock %}
